{% extends "base.html" %}
{% block content %}
<h2>Create New Post</h2>
<form method="POST" action="">
    {{ form.hidden_tag() }}
    <div>{{ form.title.label }} {{ form.title }}</div>
    <div>{{ form.content.label }} {{ form.content(rows=10) }}</div>
    <div>{{ form.submit }}</div>
</form>
<a href="{{ url_for('dashboard') }}">Back to Dashboard</a>
{% endblock %}
