{% extends "base.html" %}
{% block content %}
<h2>User Profile</h2>
<p><strong>Username:</strong> {{ user.username }}</p>
<p><strong>Email:</strong> {{ user.email }}</p>
<p><strong>Member since:</strong> {{ user.created_at.strftime('%Y-%m-%d') }}</p>
<p><strong>Total posts:</strong> {{ user.posts|length }}</p>
{% endblock %}
